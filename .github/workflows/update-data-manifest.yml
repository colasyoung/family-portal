# 向 data/ 增加或更新 stack_class_backup_*.json 并 push 后，自动生成 data/manifest.json
# 无需在本地执行 node tools/update-data-manifest.mjs
# 说明：仅修改 manifest.json 的提交不会触发本工作流，避免循环触发。

name: Update data manifest

on:
  push:
    branches: [main, master]
    # 仅 paths（不可与 paths-ignore 同用）；用 ! 排除 manifest，避免仅改 manifest 时循环触发
    paths:
      - "data/**"
      - "!data/manifest.json"

permissions:
  contents: write

concurrency:
  group: update-data-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate data/manifest.json
        run: node tools/update-data-manifest.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json
          if git diff --staged --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore(data): refresh manifest"
            git push
          fi
