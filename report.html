<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <title>训练简报 · 竞技叠杯课堂成绩</title>
    <link rel="stylesheet" href="./report.css">
</head>
<body>
    <div id="loadError" class="rep-error hidden" role="alert"></div>

    <main id="mainRoot" class="rep-main hidden">
        <div id="capture" class="rep-capture" aria-live="polite">
            <header class="rep-cap-head">
                <p class="rep-kicker">竞技叠杯课堂成绩 · 训练简报</p>
                <h1 id="repStudentName" class="rep-h1"></h1>
                <p id="repClassName" class="rep-class"></p>
                <p id="repUpdated" class="rep-updated"></p>
            </header>

            <section id="repAa" class="rep-block rep-aa hidden">
                <h2 class="rep-h2">All-around 三项总和</h2>
                <p id="repAaBody" class="rep-aa-body"></p>
            </section>

            <section class="rep-block">
                <h2 class="rep-h2">各项目最佳与班内名次</h2>
                <ul id="repProjectList" class="rep-proj-list"></ul>
            </section>

            <p id="repTagline" class="rep-tagline"></p>

            <footer class="rep-foot">数据来自教师发布的快照 · 仅供参考</footer>
        </div>

        <p class="rep-hint">提示：使用手机系统截屏或长截屏保存本页，即可分享。</p>
    </main>

    <script type="module" src="./report.js"></script>
</body>
</html>
